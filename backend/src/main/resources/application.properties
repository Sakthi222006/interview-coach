# ============================================
# APPLICATION NAME
# ============================================
spring.application.name=interview-coach-backend

# ============================================
# MYSQL DATABASE CONNECTION
# ============================================
# The URL to your MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/interview_coach_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Your MySQL username (default is root)
spring.datasource.username=root

# Your MySQL password — CHANGE THIS to your actual password
spring.datasource.password=root

# MySQL driver class (don't change this)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE SETTINGS
# ============================================
# "update" = Hibernate will auto-create/update tables based on your Java classes
# NEVER use "create" in production — it deletes all data on restart!
spring.jpa.hibernate.ddl-auto=update

# Tells Hibernate we're using MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Show SQL queries in the console (helpful for debugging)
spring.jpa.show-sql=true

# Format the SQL so it's easier to read
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# SERVER SETTINGS
# ============================================
# Backend runs on port 8080
server.port=8080

# ============================================
# JWT SETTINGS
# ============================================
# Secret key for signing tokens — keep this PRIVATE, never share it
# Must be at least 32 characters long
jwt.secret=mySecretKey1234567890abcdefghijklmnopqrstuvwxyz
jwt.expiration=86400000
# 86400000 ms = 24 hours (how long a token stays valid)

# Gemini AI
# Use environment variable GEMINI_API_KEY for production; do not store secrets in source control.
gemini.api.key=AIzaSyChfiX0GPI_nOPC0QY5Yr8KrS8hv5ZTl_Q
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
gemini.api.timeout=30000
gemini.api.max-tokens=2048

# Resume storage settings
resume.storage.path=uploads/resumes
resume.max-file-size=10MB